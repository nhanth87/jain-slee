# AI Test Agent — OpenHands + DeerFlow integration
#
# Adapted verbatim from `.ai-agents-cicd-testing-guide` section 7.3
# (Tích hợp với GitHub Actions). Requires two repository secrets:
#   - DEERFLOW_URL   — base URL of your DeerFlow 2.0 deployment
#   - OPENHANDS_URL  — base URL of your OpenHands deployment
#
# This workflow is OFF by default for the public repo (no secrets
# configured). Enable it by adding the secrets and uncommenting the
# `jobs:` block below.
name: AI Test Agent (DeerFlow + OpenHands)

on:
  pull_request:
    types: [opened, synchronize]
  issues:
    types: [labeled]   # add label `ai-test` to trigger on an issue

# Run only when both secrets are configured
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ai-test-planning:
    if: ${{ vars.DEERFLOW_URL != '' && vars.OPENHANDS_URL != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Call DeerFlow for Test Planning
        run: |
          PR_DIFF=$(git diff origin/micro-jainslee...HEAD || echo "no diff available")
          PLAN=$(curl -s -X POST $DEERFLOW_URL/api/chat/completions \
            -H "Content-Type: application/json" \
            -d "{
              \"messages\": [{
                \"role\": \"user\",
                \"content\": \"Analyze this PR diff for micro-jainslee and create a test plan:\\n\\n$PR_DIFF\"
              }],
              \"stream\": false
            }" | jq -r '.choices[0].message.content')
          echo "TEST_PLAN<<EOF" >> $GITHUB_OUTPUT
          echo "$PLAN" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          DEERFLOW_URL: ${{ secrets.DEERFLOW_URL }}

      - name: Call OpenHands to Write Tests
        uses: actions/github-script@v7
        with:
          script: |
            const plan = `${{ steps.plan.outputs.TEST_PLAN }}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `## 🤖 AI Test Plan\n\n\`\`\`\n${plan}\n\`\`\`\n\n_Generated by [DeerFlow](${DEERFLOW_URL}) — review and approve before merging._`
            });
        env:
          DEERFLOW_URL: ${{ secrets.DEERFLOW_URL }}

  run-tests:
    if: ${{ vars.DEERFLOW_URL != '' && vars.OPENHANDS_URL != '' }}
    needs: ai-test-planning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Run full test suite + stress test
        run: |
          mvn -B -ntp \
            -pl jainslee-api,jainslee-core,jainslee-apt,jainslee-spring-boot-starter,adapters/adapter-quarkus/runtime,adapters/adapter-quarkus/deployment,adapters/adapter-jakartaee \
            -am test \
            -DargLine="-Xmx4g"

      - name: Report results back to AI Agent
        if: always()
        run: |
          echo "Test results: see surefire-reports under jainslee-core/target"
          echo "Stress test: mvn -pl jainslee-core test -Dtest=SbbEntityPoolStressTest"
