# micro-jainslee CI — build, test, license header verification
#
# Adapted from .ai-agents-cicd-testing-guide section 7.3 (Tích hợp với
# GitHub Actions). The guide's original workflow invokes OpenHands +
# DeerFlow for AI-driven test planning; we keep the OpenHands/DeerFlow
# template in `ai-test-agent.yml` (separate file) and use a traditional
# Maven CI here as the primary gate.
name: CI

on:
  push:
    branches: [micro-jainslee, main]
    tags: ['v*']
  pull_request:
    branches: [micro-jainslee, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MAVEN_OPTS: "-Xmx2g -Djava.awt.headless=true"
  JAVA_VERSION: "25"

jobs:
  # ---------------------------------------------------------------------
  # Job 1 — Build on JDK 25 only
  #
  # Java 25 is the project's runtime target — it is required to exercise
  # the Java 25 Virtual Threads backing VirtualThreadSbbEntityPool.
  # Source/target is still 8; only the runtime JVM is JDK 25.
  # ---------------------------------------------------------------------
  build:
    name: Build (${{ matrix.os }} / JDK ${{ matrix.java }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        java: ['25']
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Cache local Maven repo (~/.m2)
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Install micro-jainslee reactor (skip APT chicken-and-egg)
        # -Dmaven.compiler.proc=none disables annotation processing entirely
        # so the first build of jainslee-apt does not try to load its own
        # SPI processor class (which does not exist yet at this point).
        # Subsequent builds inside the same matrix job use the freshly
        # installed jar and DO run the processor.
        run: |
          mvn -pl jainslee-apt -am install -DskipTests -B -ntp               -Dmaven.compiler.proc=none

      - name: Build + test (micro-jainslee modules)
        run: |
          mvn -B -ntp \
            -pl jainslee-api,jainslee-core,jainslee-apt,jainslee-spring-boot-starter,ra-connectors,adapters/adapter-quarkus/runtime,adapters/adapter-quarkus/deployment,adapters/adapter-jakartaee \
            -am test \
            -DargLine="-Xmx4g"

      - name: Stress test (virtual threads required)
        run: |
          mvn -B -ntp -pl jainslee-core test \
            -Dtest=SbbEntityPoolStressTest \
            -DargLine="-Xmx4g -XX:+UseZGC -XX:+ZGenerational"

      - name: Generate JavaDoc
        if: github.ref == 'refs/heads/micro-jainslee'
        run: mvn -B -ntp -pl jainslee-api,jainslee-core javadoc:aggregate -DskipTests

      - name: Publish JavaDoc to GitHub Pages
        if: github.ref == 'refs/heads/micro-jainslee'
        uses: actions/upload-pages-artifact@v3
        with:
          path: jainslee-api/target/site/apidocs

  # ---------------------------------------------------------------------
  # Job 2 — License header verification (runs on every PR)
  # ---------------------------------------------------------------------
  license-check:
    name: License header verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check every micro-jainslee .java has the dual-license header
        run: |
          set -e
          MISSING=0
          for f in $(find jainslee-* adapters ra-connectors \
                       -name '*.java' -not -path '*/target/*'); do
            if ! grep -q 'Dual-licensed: GPLv3' "$f"; then
              echo "::error file=$f::Missing license header"
              MISSING=$((MISSING + 1))
            fi
          done
          if [ "$MISSING" -gt 0 ]; then
            echo "::error::$MISSING file(s) missing the dual-license header"
            exit 1
          fi
          echo "All micro-jainslee .java files have the dual-license header."

  # ---------------------------------------------------------------------
  # Job 3 — Adapter JAR fixture test (verify jainslee-apt processor)
  # ---------------------------------------------------------------------
  apt-fixture:
    name: jainslee-apt fixture test (Java 25)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up fixture
        run: |
          mkdir -p /tmp/apt-test/src/com/example
          cat > /tmp/apt-test/src/com/example/MySbb.java <<'JAVA'
          package com.example;
          import com.microjainslee.api.annotations.SbbAnnotation;
          @SbbAnnotation(name="MySbb", vendor="com.example", version="1.0")
          public class MySbb { }
          JAVA
          cat > /tmp/apt-test/src/com/example/MyEvent.java <<'JAVA'
          package com.example;
          import com.microjainslee.api.annotations.EventType;
          @EventType(name="MyEvent", vendor="com.example", version="1.0")
          public class MyEvent { }
          JAVA

      - name: Compile with annotation processor
        run: |
          CP="$HOME/.m2/repository/com/microjainslee/jainslee-api/1.1.0/jainslee-api-1.1.0.jar"
          CP="$CP:$HOME/.m2/repository/com/microjainslee/jainslee-apt/1.1.0/jainslee-apt-1.1.0.jar"
          CP="$CP:$HOME/.m2/repository/org/apache/logging/log4j/log4j-api/2.23.1/log4j-api-2.23.1.jar"
          CP="$CP:$HOME/.m2/repository/org/apache/logging/log4j/log4j-core/2.23.1/log4j-core-2.23.1.jar"
          mkdir -p /tmp/apt-test/out
          javac -cp "$CP" -processorpath "$CP" -d /tmp/apt-test/out /tmp/apt-test/src/com/example/*.java

      - name: Verify generated index file
        run: |
          test -f /tmp/apt-test/out/META-INF/microjainslee/sbb-index.properties || (echo "sbb-index.properties not generated"; exit 1)
          grep -q 'sbb.0.class=com.example.MySbb' /tmp/apt-test/out/META-INF/microjainslee/sbb-index.properties || (echo "Missing sbb.0.class entry"; exit 1)
          grep -q 'eventType.0.class=com.example.MyEvent' /tmp/apt-test/out/META-INF/microjainslee/sbb-index.properties || (echo "Missing eventType.0.class entry"; exit 1)
          cat /tmp/apt-test/out/META-INF/microjainslee/sbb-index.properties

  # ---------------------------------------------------------------------
  # Job 4 — Pages deployment (depends on build+javadoc)
  # ---------------------------------------------------------------------
  deploy-javadoc:
    name: Deploy JavaDoc to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/micro-jainslee'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
