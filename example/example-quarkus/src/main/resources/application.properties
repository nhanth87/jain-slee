# Quarkus HTTP
quarkus.http.port=8080
quarkus.http.test-port=0

# MicroSLEE container tuning (consumed by adapter-quarkus
# MicroJainsleeBuildConfig build-time processor)
microjainslee.buffer-size=2048
microjainslee.prefer-virtual-threads=true
microjainslee.sbb-pool-min=16
microjainslee.sbb-pool-max=4096
microjainslee.sbb-per-virtual-thread=true

# Mock gRPC latency (consumed by MockGrpcMenuClient @ConfigProperty)
ussd.demo.grpc.latency-ms=10
