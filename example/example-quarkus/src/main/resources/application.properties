# Quarkus admin HTTP (USSD traffic uses HTTP RA on ussd.http.port)
quarkus.http.port=18080
quarkus.http.test-port=0

# MicroSLEE container tuning
microjainslee.buffer-size=2048
microjainslee.prefer-virtual-threads=true
microjainslee.sbb-pool-min=16
microjainslee.sbb-pool-max=4096
microjainslee.sbb-per-virtual-thread=true

# HTTP ingress Resource Adaptor (ussdgw-simulator targets this port)
ussd.http.port=8080
ussd.session.timeout-ms=30000

# gRPC USSD Application Server (grpc-simulator)
grpc.host=127.0.0.1
grpc.port=9090
