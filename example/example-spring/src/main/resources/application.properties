# Spring Boot + micro-jainslee configuration
spring.application.name=ussd-spring-demo
server.port=8080

# microjainslee configuration (read by jainslee-spring-boot-starter's
# MicroJainsleeProperties @ConfigurationProperties).
microjainslee.event-router.buffer-size=2048
microjainslee.event-router.prefer-virtual-threads=true
microjainslee.sbb-pool.min=16
microjainslee.sbb-pool.max=4096
microjainslee.sbb-pool.per-virtual-thread=true

# Mock gRPC backend latency (consumed by MockGrpcMenuClient @Value).
ussd.demo.grpc.latency-ms=10
